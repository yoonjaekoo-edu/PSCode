name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PSCode ${{ github.ref_name }}"
          releaseBody: "Automated release by GitHub Actions."
          releaseDraft: true
          prerelease: false

      - name: Rename installer
        shell: powershell
        run: |
          $file = Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | Select-Object -First 1
          Copy-Item $file.FullName "PSCode_Setup.exe"

      - name: Upload PSCode_Setup.exe
        uses: softprops/action-gh-release@v2
        with:
          files: PSCode_Setup.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
